# Example: ``scrapers.jira`` and ``scrapers.slack`` with ``enabled`` + ``jobs[]``.
#
# Each enabled job gets a ConfigMap (``job.json``) + CronJob on ``schedule``. Non-secret
# fields live in the ConfigMap; tokens use ``auth.*SecretName`` → env ``valueFrom``.
#
# * **Jira** — ``source: jira``, ``query`` (JQL). Site URL + watermark dir + auth on
#   ``scrapers.jira``; optional numeric defaults merge into ``job.json``.
# * **Slack** — ``source: slack_search`` (Real-time Search + ``conversations.replies`` /
#   ``conversations.history`` context windows; needs ``SLACK_USER_TOKEN``) or
#   ``source: slack_channel`` (``conversationId`` + ``conversations.history`` incremental
#   state under ``stateDir``; needs ``SLACK_BOT_TOKEN``).
#
# Unknown ``source`` values cause the scraper process to exit non-zero (CrashLoop).
# At least one enabled job under an enabled parent deploys the managed RAG Deployment+Service.
#
# When adding a scraper source, update: this file, ``helm/tests/with_scrapers_test.yaml``,
# ``grafana/dalc-agent-overview.json``, and ``helm/chart/templates/scraper-*.yaml``.
declarative-agent-library:
  systemPrompt: |
    Respond, "Hello :wave:"
  image:
    repository: config-first-hosted-agents
    tag: local
    pullPolicy: Never
  scrapers:
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    ragService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8090
      resources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    jira:
      enabled: true
      siteUrl: https://example.atlassian.net
      watermarkDir: /tmp/jira-scraper-watermark
      auth:
        emailSecretName: jira-credentials
        emailSecretKey: email
        tokenSecretName: jira-credentials
        tokenSecretKey: token
      defaults:
        maxIssuesPerRun: 25
        maxCommentsPerIssue: 80
        overlapMinutes: 5
      jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
          scope: demo-jira-scope
        - schedule: "15 0 * * *"
          enabled: false
          source: jira
          query: 'project = OTHER ORDER BY updated ASC'
    slack:
      enabled: true
      stateDir: /tmp/slack-scraper-state
      auth:
        botTokenSecretName: slack-bot-token
        botTokenSecretKey: token
        userTokenSecretName: slack-user-token
        userTokenSecretKey: token
      jobs:
        - schedule: "30 * * * *"
          source: slack_search
          query: deployment OR kubernetes
          contextBeforeMinutes: 20
          contextAfterMinutes: 10
          scope: demo-slack-rts
        - schedule: "45 */4 * * *"
          source: slack_channel
          conversationId: C0123456789
          scope: demo-slack-channel
