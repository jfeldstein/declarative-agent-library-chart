# Default **with-scrapers** story: Jira + Slack with multiple enabled jobs (see README.md).
#
# Source semantics, secret wiring, and maintainer checklist (tests, Grafana, templates)
# are documented in **README.md** in this directory.
declarative-agent-library:
  systemPrompt: |
    Respond, "Hello :wave:"
  image:
    repository: config-first-hosted-agents
    tag: local
    pullPolicy: Never
  scrapers:
    # Optional durable cursor backend for incremental state:
    # cursorStore:
    #   backend: postgres
    #   postgresUrlSecretName: scraper-postgres-url
    #   postgresUrlSecretKey: url
    #
    # If no scraper override Secret is set, scraper jobs reuse declarative-agent-library.checkpoints.postgresUrl
    # via HOSTED_AGENT_POSTGRES_URL when backend=postgres.
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    ragService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8090
      resources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    jira:
      enabled: true
      siteUrl: https://example.atlassian.net
      watermarkDir: /tmp/jira-scraper-watermark
      auth:
        emailSecretName: jira-credentials
        emailSecretKey: email
        tokenSecretName: jira-credentials
        tokenSecretKey: token
      defaults:
        maxIssuesPerRun: 25
        maxCommentsPerIssue: 80
        overlapMinutes: 5
      jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
          scope: demo-jira-scope
        - schedule: "15 0 * * *"
          enabled: false
          source: jira
          query: 'project = OTHER ORDER BY updated ASC'
    slack:
      enabled: true
      stateDir: /tmp/slack-scraper-state
      auth:
        botTokenSecretName: slack-bot-token
        botTokenSecretKey: token
        userTokenSecretName: slack-user-token
        userTokenSecretKey: token
      jobs:
        - schedule: "30 * * * *"
          source: slack_search
          query: deployment OR kubernetes
          contextBeforeMinutes: 20
          contextAfterMinutes: 10
          scope: demo-slack-rts
        - schedule: "45 */4 * * *"
          source: slack_channel
          conversationId: C0123456789
          scope: demo-slack-channel
