# Jira-only scraper story: one enabled Jira job, Slack disabled. Deploys RAG + one CronJob.
# See README.md for how this differs from the default and slack-only setups.
declarative-agent:
  systemPrompt: |
    Respond, "Hello :wave:"
  image:
    repository: declarative-agent
    tag: local
    pullPolicy: Never
  scrapers:
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    ragService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8090
      resources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    jira:
      enabled: true
      siteUrl: https://example.atlassian.net
      watermarkDir: /tmp/jira-scraper-watermark
      auth:
        emailSecretName: jira-credentials
        emailSecretKey: email
        tokenSecretName: jira-credentials
        tokenSecretKey: token
      defaults:
        maxIssuesPerRun: 25
        maxCommentsPerIssue: 80
        overlapMinutes: 5
      jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
          scope: demo-jira-scope
    slack:
      enabled: false
