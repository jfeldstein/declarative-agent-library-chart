# Example: opt-in observability on the Declarative Agent Library subchart.
# See docs/observability.md and grafana/README.md.
#
# RAG is deployed when ``scrapers.jira`` or ``scrapers.slack`` has at least one enabled
# job (parent ``enabled: true``); RAG Prometheus annotations follow o11y.prometheusAnnotations.
declarative-agent-library:
  systemPrompt: |
    Respond, "Hello :wave:"
  image:
    repository: config-first-hosted-agents
    tag: local
    pullPolicy: Never
  o11y:
    prometheusAnnotations:
      enabled: true
    structuredLogs:
      json: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      extraLabels:
        release: prometheus
  scrapers:
    ragService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8090
      resources: {}
    jira:
      enabled: true
      siteUrl: https://example.atlassian.net
      watermarkDir: /tmp/jira-scraper-watermark
      auth:
        emailSecretName: jira-credentials
        emailSecretKey: email
        tokenSecretName: jira-credentials
        tokenSecretKey: token
      jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
    slack:
      enabled: false
      jobs: []
