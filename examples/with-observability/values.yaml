# Example: opt-in observability on the Declarative Agent Library subchart.
# See docs/observability.md and grafana/README.md.
#
# RAG is deployed when ``scrapers.jira`` or ``scrapers.slack`` has at least one enabled
# job (parent ``enabled: true``); RAG Prometheus annotations follow observability.prometheusAnnotations.
agent:
  systemPrompt: |
    Respond, "Hello :wave:"
  image:
    repository: declarative-agent-library-chart
    tag: local
    pullPolicy: Never
  observability:
    plugins:
      # Optional: merge examples/with-observability/values-consumer-plugins.yaml to exercise
      # PEP 621 consumer observability hooks (disabled by default in the library chart).
      prometheus:
        enabled: true
    prometheusAnnotations:
      enabled: true
    structuredLogs:
      json: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      extraLabels:
        release: prometheus
  scrapers:
    ragService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8090
      resources: {}
    jira:
      enabled: true
      siteUrl: https://example.atlassian.net
      watermarkDir: /tmp/jira-scraper-watermark
      auth:
        emailSecretName: jira-credentials
        emailSecretKey: email
        tokenSecretName: jira-credentials
        tokenSecretKey: token
      jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
    slack:
      enabled: false
      jobs: []
