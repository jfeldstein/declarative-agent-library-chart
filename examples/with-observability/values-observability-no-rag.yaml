# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-O11Y-SCRAPE-005]
# Alternate fixture: Kubernetes observability (annotations + ServiceMonitor) but no scraper jobs,
# so the managed RAG HTTP service is not deployed. Used by helm unittest negative path.
agent:
  systemPrompt: |
    Respond, "Hello :wave:"
  image:
    repository: declarative-agent-library-chart
    tag: local
    pullPolicy: Never
  observability:
    plugins:
      prometheus:
        enabled: true
    prometheusAnnotations:
      enabled: true
    structuredLogs:
      json: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      extraLabels:
        release: prometheus
  scrapers:
    ragService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8090
      resources: {}
    jira:
      enabled: false
      jobs: []
    slack:
      enabled: false
      jobs: []
