# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-O11Y-SCRAPE-004] [DALC-REQ-O11Y-SCRAPE-005] [DALC-REQ-O11Y-SCRAPE-006]
values:
  - ../../examples/with-observability/values.yaml
suite: with-observability prometheus and ServiceMonitors
release:
  name: cfha-ci-o11y
tests:
  - it: agent Deployment pod template has prometheus scrape annotations
    template: charts/declarative-agent-library/templates/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_LOG_FORMAT
            value: json
  - it: agent Service has prometheus scrape annotations
    template: charts/declarative-agent-library/templates/service.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
  - it: optional managed RAG Deployment has prometheus scrape annotations when deployed
    template: charts/declarative-agent-library/templates/rag-deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
  - it: optional managed RAG Service has prometheus scrape annotations when deployed
    template: charts/declarative-agent-library/templates/rag-service.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
  - it: renders agent ServiceMonitor
    template: charts/declarative-agent-library/templates/servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - matchRegex:
          path: metadata.name
          pattern: -agent$
  - it: renders ServiceMonitor for optional managed RAG when that Service is deployed
    template: charts/declarative-agent-library/templates/rag-servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - matchRegex:
          path: metadata.name
          pattern: -rag$
  - it: with ServiceMonitor enabled but RAG not deployed, rag ServiceMonitor template renders nothing
    values:
      - ../../examples/with-observability/values-observability-no-rag.yaml
    template: charts/declarative-agent-library/templates/rag-servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: with ServiceMonitor enabled but RAG not deployed, agent ServiceMonitor still renders
    values:
      - ../../examples/with-observability/values-observability-no-rag.yaml
    template: charts/declarative-agent-library/templates/servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
