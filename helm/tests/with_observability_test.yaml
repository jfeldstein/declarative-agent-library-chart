# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-O11Y-SCRAPE-004] [DALC-REQ-O11Y-SCRAPE-005] [DALC-REQ-O11Y-SCRAPE-006]
# Agent vs RAG Services share metadata.name patterns with Deployments; select Services by spec.ports[0].port
# (chart default agent 8088 vs examples ragService 8090). Agent ServiceMonitor: metadata.name …-agent (unique).
# RAG Deployment/Service/ServiceMonitor share metadata.name …-rag; RAG ServiceMonitor alone matches metadata.labels
# (component rag + release from serviceMonitor.extraLabels).
values:
  - ../../examples/with-observability/values.yaml
suite: with-observability prometheus and ServiceMonitors
release:
  name: dalc-ci-o11y
tests:
  - it: agent Deployment pod template has prometheus scrape annotations
    template: templates/agent.yaml
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
        documentSelector:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: agent
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_LOG_FORMAT
            value: json
        documentSelector:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: agent
  - it: agent Service has prometheus scrape annotations
    template: templates/agent.yaml
    asserts:
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
        documentSelector:
          path: spec.ports[0].port
          value: 8088
      - isKind:
          of: Service
        documentSelector:
          path: spec.ports[0].port
          value: 8088
  - it: optional managed RAG Deployment has prometheus scrape annotations when deployed
    template: templates/agent.yaml
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
        documentSelector:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: rag
  - it: optional managed RAG Service has prometheus scrape annotations when deployed
    template: templates/agent.yaml
    asserts:
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
        documentSelector:
          path: spec.ports[0].port
          value: 8090
      - isKind:
          of: Service
        documentSelector:
          path: spec.ports[0].port
          value: 8090
  - it: renders agent ServiceMonitor
    template: templates/agent.yaml
    asserts:
      - isKind:
          of: ServiceMonitor
        documentSelector:
          path: metadata.name
          value: dalc-ci-o11y-declarative-agent-library-chart-agent
      - matchRegex:
          path: metadata.name
          pattern: -agent$
        documentSelector:
          path: metadata.name
          value: dalc-ci-o11y-declarative-agent-library-chart-agent
  - it: renders ServiceMonitor for optional managed RAG when that Service is deployed
    template: templates/agent.yaml
    asserts:
      - isKind:
          of: ServiceMonitor
        documentSelector:
          path: metadata.labels
          value:
            helm.sh/chart: declarative-agent-library-chart-0.1.0
            app.kubernetes.io/name: declarative-agent-library-chart
            app.kubernetes.io/instance: dalc-ci-o11y
            app.kubernetes.io/version: "0.1.0"
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/component: rag
            release: prometheus
      - matchRegex:
          path: metadata.name
          pattern: -rag$
        documentSelector:
          path: metadata.labels
          value:
            helm.sh/chart: declarative-agent-library-chart-0.1.0
            app.kubernetes.io/name: declarative-agent-library-chart
            app.kubernetes.io/instance: dalc-ci-o11y
            app.kubernetes.io/version: "0.1.0"
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/component: rag
            release: prometheus
  - it: with ServiceMonitor enabled but RAG not deployed, rag ServiceMonitor template renders nothing
    values:
      - ../../examples/with-observability/values-observability-no-rag.yaml
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: ServiceMonitor
    asserts:
      - hasDocuments:
          count: 1
          filterAware: true
  - it: with ServiceMonitor enabled but RAG not deployed, agent ServiceMonitor still renders
    values:
      - ../../examples/with-observability/values-observability-no-rag.yaml
    template: templates/agent.yaml
    asserts:
      - isKind:
          of: ServiceMonitor
        documentSelector:
          path: metadata.name
          value: dalc-ci-o11y-declarative-agent-library-chart-agent
