# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-RAG-SCRAPERS-002] [DALC-REQ-SLACK-SCRAPER-001] [DALC-REQ-HELM-UNITTEST-004] [DALC-REQ-EXAMPLE-VALUES-FILES-001] [DALC-REQ-O11Y-SCRAPE-004]
values:
  - ../../examples/with-scrapers/values.yaml
suite: with-scrapers default values
release:
  name: dalc-ci-scrapers
tests:
  - it: renders one ConfigMap per enabled jira and slack job
    template: templates/agent.yaml
    asserts:
      - equal:
          path: kind
          value: ConfigMap
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-job-jira-0
      - equal:
          path: kind
          value: ConfigMap
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-job-slack-0
      - equal:
          path: kind
          value: ConfigMap
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-job-slack-1
  - it: renders one CronJob per enabled jira and slack job
    template: templates/agent.yaml
    asserts:
      - isKind:
          of: CronJob
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
      - isKind:
          of: CronJob
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-slack-0
      - isKind:
          of: CronJob
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-slack-1
  - it: jira CronJob runs jira_job module with mounted job config
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[2]
          value: hosted_agents.scrapers.jira_job
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: SCRAPER_JOB_CONFIG
            value: /config/job.json
  - it: slack_search CronJob runs slack_job module
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-slack-0
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[2]
          value: hosted_agents.scrapers.slack_job
  - it: scraper CronJob pod template has prometheus scrape annotations when enabled
    template: templates/agent.yaml
    values:
      - ../../examples/with-scrapers/values.yaml
      - ../../examples/with-scrapers/values.prometheus-annotations.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations["prometheus.io/port"]
          value: "9091"
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations["prometheus.io/path"]
          value: "/metrics"
  - it: renders RAG deployment when a scraper job is enabled
    template: templates/agent.yaml
    documentSelector:
      path: spec.template.metadata.labels["app.kubernetes.io/component"]
      value: rag
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: rag
  - it: jira-only values render one scraper ConfigMap # [DALC-REQ-HELM-UNITTEST-004]
    values:
      - ../../examples/with-scrapers/values.jira-only.yaml
    template: templates/agent.yaml
    asserts:
      - equal:
          path: kind
          value: ConfigMap
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-job-jira-0
  - it: jira-only single CronJob runs jira_job module
    values:
      - ../../examples/with-scrapers/values.jira-only.yaml
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    asserts:
      - hasDocuments:
          count: 1
          filterAware: true
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[2]
          value: hosted_agents.scrapers.jira_job
  - it: jira-only values render RAG deployment
    values:
      - ../../examples/with-scrapers/values.jira-only.yaml
    template: templates/agent.yaml
    documentSelector:
      path: spec.template.metadata.labels["app.kubernetes.io/component"]
      value: rag
    asserts:
      - hasDocuments:
          count: 1
          filterAware: true
  - it: slack-only values render one scraper ConfigMap # [DALC-REQ-HELM-UNITTEST-004]
    values:
      - ../../examples/with-scrapers/values.slack-only.yaml
    template: templates/agent.yaml
    asserts:
      - equal:
          path: kind
          value: ConfigMap
        documentSelector:
          path: metadata.name
          value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-job-slack-0
  - it: slack-only single CronJob runs slack_job module
    values:
      - ../../examples/with-scrapers/values.slack-only.yaml
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-slack-0
    asserts:
      - hasDocuments:
          count: 1
          filterAware: true
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[2]
          value: hosted_agents.scrapers.slack_job
  - it: slack-only values render RAG deployment
    values:
      - ../../examples/with-scrapers/values.slack-only.yaml
    template: templates/agent.yaml
    documentSelector:
      path: spec.template.metadata.labels["app.kubernetes.io/component"]
      value: rag
    asserts:
      - hasDocuments:
          count: 1
          filterAware: true
  - it: scraper jobs do not inherit postgres DSN when cursor backend is file [DALC-REQ-SCRAPER-CURSOR-003]
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    set:
      agent.checkpoints.postgresUrl: postgres://shared.example/db
    asserts:
      - notContains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_POSTGRES_URL
      - notContains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: SCRAPER_CURSOR_BACKEND
  - it: scraper jobs wire shared postgres DSN when cursor backend is postgres [DALC-REQ-SCRAPER-CURSOR-003]
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    set:
      agent.checkpoints.postgresUrl: postgres://shared.example/db
      agent.scrapers.cursorStore.backend: postgres
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: SCRAPER_CURSOR_BACKEND
            value: postgres
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_POSTGRES_URL
            value: postgres://shared.example/db
  - it: scraper jobs prefer DSN Secret override for postgres backend [DALC-REQ-SCRAPER-CURSOR-004]
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    set:
      agent.checkpoints.postgresUrl: postgres://shared.example/db
      agent.scrapers.cursorStore.backend: postgres
      agent.scrapers.cursorStore.postgresUrlSecretName: scraper-dsn
      agent.scrapers.cursorStore.postgresUrlSecretKey: url
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: SCRAPER_POSTGRES_URL
            valueFrom:
              secretKeyRef:
                name: scraper-dsn
                key: url
      - notContains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_POSTGRES_URL
  - it: jira ConfigMap job.json excludes Helm-only siteUrl and watermarkDir keys
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-job-jira-0
    set:
      agent.scrapers.jira.jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
          scope: demo-jira-scope
          siteUrl: https://only-env.example.net
          watermarkDir: /only-env/wm
    asserts:
      - notMatchRegex:
          path: data["job.json"]
          pattern: siteUrl
      - notMatchRegex:
          path: data["job.json"]
          pattern: watermarkDir
  - it: jira CronJob env prefers per-job siteUrl and watermarkDir over scrapers.jira defaults
    template: templates/agent.yaml
    documentSelector:
      path: metadata.name
      value: dalc-ci-scrapers-declarative-agent-library-chart-scraper-jira-0
    set:
      agent.scrapers.jira.siteUrl: https://parent.example.net
      agent.scrapers.jira.watermarkDir: /parent/wm
      agent.scrapers.jira.jobs:
        - schedule: "0 * * * *"
          source: jira
          query: 'project = DEMO ORDER BY updated ASC'
          scope: demo-jira-scope
          siteUrl: https://child.example.net
          watermarkDir: /child/wm
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: JIRA_SITE_URL
            value: https://child.example.net
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: JIRA_WATERMARK_DIR
            value: /child/wm
