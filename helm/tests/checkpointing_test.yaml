# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-HELM-UNITTEST-002] [DALC-REQ-CHART-RTV-001]
values:
  - ../../examples/checkpointing/values.yaml
suite: checkpointing example enables LangGraph checkpoints (memory)
release:
  name: dalc-ci-checkpointing
tests:
  - it: agent Deployment sets checkpoint env from checkpoints [DALC-REQ-CHART-RTV-001]
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_CHECKPOINTS_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_CHECKPOINT_BACKEND
            value: memory
