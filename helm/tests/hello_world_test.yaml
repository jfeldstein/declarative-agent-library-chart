# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-HELM-UNITTEST-002] [DALC-REQ-RAG-SCRAPERS-002] [DALC-REQ-RAG-SCRAPERS-004] [DALC-REQ-CHART-RTV-001] [DALC-REQ-CHART-RTV-002] [DALC-REQ-CHART-RTV-003] [DALC-REQ-DALC-PKG-002] [DALC-REQ-POSTGRES-AGENT-PERSISTENCE-002] [DALC-VER-002]
values:
  - ../../examples/hello-world/values.yaml
suite: hello-world default values
release:
  name: dalc-ci
tests:
  - it: checkpoints postgresUrl maps to HOSTED_AGENT_POSTGRES_URL
    set:
      agent.checkpoints.postgresUrl: "postgresql://u:p@h:5432/db"
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_POSTGRES_URL
            value: "postgresql://u:p@h:5432/db"
  - it: wandb enabled with project sets env
    set:
      agent.wandb.enabled: true
      agent.wandb.project: myproj
      agent.wandb.entity: acme
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_WANDB_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WANDB_PROJECT
            value: myproj
  - it: scrapers.slack.feedback.enabled wires Slack feedback env
    set:
      agent.scrapers.slack.feedback.enabled: true
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_FEEDBACK_ENABLED
            value: "true"
