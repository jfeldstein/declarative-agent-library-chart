# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-HELM-UNITTEST-002] [DALC-REQ-RAG-SCRAPERS-002] [DALC-REQ-RAG-SCRAPERS-004] [DALC-REQ-CHART-RTV-001] [DALC-REQ-CHART-RTV-002] [DALC-REQ-CHART-RTV-003] [DALC-REQ-CHART-RTV-005] [DALC-REQ-CHART-RTV-006] [DALC-REQ-CHART-RTV-007] [DALC-REQ-CHART-PRESENCE-001] [DALC-REQ-CHART-PRESENCE-002] [DALC-REQ-CHART-PRESENCE-003] [DALC-REQ-DALC-PKG-002] [DALC-REQ-POSTGRES-AGENT-PERSISTENCE-002] [DALC-VER-002]
values:
  - ../../examples/hello-world/values.yaml
suite: hello-world default values
release:
  name: dalc-ci
tests:
  - it: checkpoints postgresUrl maps to HOSTED_AGENT_POSTGRES_URL
    set:
      agent.checkpoints.postgresUrl: "postgresql://u:p@h:5432/db"
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_POSTGRES_URL
            value: "postgresql://u:p@h:5432/db"
  - it: wandb enabled with project sets env
    set:
      agent.observability.plugins.wandb.enabled: true
      agent.observability.plugins.wandb.project: myproj
      agent.observability.plugins.wandb.entity: acme
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_WANDB_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WANDB_PROJECT
            value: myproj
  # [DALC-REQ-LANGFUSE-TRACE-002]
  - it: observability.plugins.langfuse wires Langfuse SDK env from secrets
    set:
      agent.observability.plugins.langfuse.enabled: true
      agent.observability.plugins.langfuse.host: https://cloud.langfuse.com
      agent.observability.plugins.langfuse.flushIntervalSeconds: 12
      agent.observability.plugins.langfuse.publicKeySecret.secretName: lf-keys
      agent.observability.plugins.langfuse.publicKeySecret.secretKey: pk
      agent.observability.plugins.langfuse.secretKeySecret.secretName: lf-keys
      agent.observability.plugins.langfuse.secretKeySecret.secretKey: sk
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_LANGFUSE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_LANGFUSE_HOST
            value: https://cloud.langfuse.com
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_LANGFUSE_FLUSH_INTERVAL_SECONDS
            value: "12"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_LANGFUSE_PUBLIC_KEY
            valueFrom:
              secretKeyRef:
                name: lf-keys
                key: pk
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_LANGFUSE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: lf-keys
                key: sk
  - it: scrapers.slack.feedback.enabled wires Slack feedback env
    set:
      agent.scrapers.slack.feedback.enabled: true
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_FEEDBACK_ENABLED
            value: "true"
  # [DALC-REQ-RAG-SCRAPERS-002] Negative paths: scraper CronJobs omitted when scrapers off or jobs disabled.
  - it: no CronJobs when scrapers default off (hello-world baseline)
    template: templates/agent.yaml
    asserts:
      - containsDocument:
          kind: CronJob
          apiVersion: batch/v1
        not: true
  - it: no CronJobs when scrapers.jira.enabled false even if jobs list is non-empty
    template: templates/agent.yaml
    set:
      agent.scrapers.jira.enabled: false
      agent.scrapers.jira.jobs:
        - schedule: "0 * * * *"
          source: jira
          query: "project = DEMO ORDER BY updated ASC"
          scope: parent-disabled-ignored
    asserts:
      - containsDocument:
          kind: CronJob
          apiVersion: batch/v1
        not: true
  - it: no CronJobs when jira scraper enabled but sole job has enabled false
    template: templates/agent.yaml
    set:
      agent.scrapers.jira.enabled: true
      agent.scrapers.jira.siteUrl: https://example.atlassian.net
      agent.scrapers.jira.jobs:
        - enabled: false
          schedule: "0 * * * *"
          source: jira
          query: "project = DEMO ORDER BY updated ASC"
          scope: job-disabled-scope
    asserts:
      - containsDocument:
          kind: CronJob
          apiVersion: batch/v1
        not: true
  # Slack LLM-time tools ([DALC-REQ-SLACK-TOOLS-002]): HOSTED_AGENT_SLACK_TOOLS_* on agent only
  - it: slackTools wires bot token secret and tuning env on agent Deployment
    set:
      agent.slackTools.botTokenSecretName: slack-tools-bot
      agent.slackTools.botTokenSecretKey: bot-token-key
      agent.slackTools.historyLimit: 25
      agent.slackTools.timeoutSeconds: 45
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TOOLS_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: slack-tools-bot
                key: bot-token-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TOOLS_HISTORY_LIMIT
            value: "25"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TOOLS_TIMEOUT_SECONDS
            value: "45"
  # [DALC-REQ-PLUGIN-LOG-SHIPPING-001]
  - it: observability.plugins.logShipping.enabled injects HOSTED_AGENT_LOG_FORMAT json without structuredLogs json
    set:
      agent.observability.plugins.logShipping.enabled: true
      agent.observability.structuredLogs.json: false
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_LOG_FORMAT
            value: json
  # [DALC-REQ-SLACK-TRIGGER-004] distinct HOSTED_AGENT_SLACK_TRIGGER_* from Secrets (not slackTools/scrapers)
  - it: slackTrigger wires trigger env toggles and secret refs on agent Deployment
    set:
      agent.slackTrigger.enabled: true
      agent.slackTrigger.socketMode: true
      agent.slackTrigger.eventDedupe: true
      agent.slackTrigger.signingSecretSecretName: slack-trig-signing
      agent.slackTrigger.signingSecretSecretKey: signing-key
      agent.slackTrigger.appTokenSecretName: slack-trig-app
      agent.slackTrigger.appTokenSecretKey: app-key
      agent.slackTrigger.botTokenSecretName: slack-trig-bot
      agent.slackTrigger.botTokenSecretKey: bot-key
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TRIGGER_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TRIGGER_SOCKET_MODE
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TRIGGER_EVENT_DEDUPE
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TRIGGER_SIGNING_SECRET
            valueFrom:
              secretKeyRef:
                name: slack-trig-signing
                key: signing-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TRIGGER_APP_TOKEN
            valueFrom:
              secretKeyRef:
                name: slack-trig-app
                key: app-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_TRIGGER_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: slack-trig-bot
                key: bot-key
  # [DALC-REQ-JIRA-TRIGGER-004] distinct HOSTED_AGENT_JIRA_TRIGGER_* from Secrets (not jiraTools/scrapers)
  - it: jiraTrigger wires trigger env toggles and webhook secret ref on agent Deployment
    set:
      agent.jiraTrigger.enabled: true
      agent.jiraTrigger.eventDedupe: true
      agent.jiraTrigger.webhookSecretSecretName: jira-trig-wh
      agent.jiraTrigger.webhookSecretSecretKey: webhook-secret
      agent.jiraTrigger.httpPath: /hooks/jira/inbound
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TRIGGER_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TRIGGER_EVENT_DEDUPE
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TRIGGER_HTTP_PATH
            value: "/hooks/jira/inbound"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TRIGGER_WEBHOOK_SECRET
            valueFrom:
              secretKeyRef:
                name: jira-trig-wh
                key: webhook-secret
  # [DALC-REQ-CHART-PRESENCE-002]
  - it: presence slack botUserId wires HOSTED_AGENT_SLACK_BOT_USER_ID from Secret
    set:
      agent.presence.slack.botUserId.secretName: slack-id
      agent.presence.slack.botUserId.secretKey: bot-user-id
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_BOT_USER_ID
            valueFrom:
              secretKeyRef:
                name: slack-id
                key: bot-user-id
  - it: presence jira botAccountId wires HOSTED_AGENT_JIRA_BOT_ACCOUNT_ID from Secret
    set:
      agent.presence.jira.botAccountId.secretName: jira-id
      agent.presence.jira.botAccountId.secretKey: account-id
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_BOT_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: jira-id
                key: account-id
  # [DALC-REQ-JIRA-TOOLS-002]
  - it: jiraTools enabled wires HOSTED_AGENT_JIRA_TOOLS_* on Deployment
    set:
      agent.jiraTools.enabled: true
      agent.jiraTools.simulated: false
      agent.jiraTools.siteUrl: "https://acme.atlassian.net"
      agent.jiraTools.auth.emailSecretName: jt-mail
      agent.jiraTools.auth.emailSecretKey: email
      agent.jiraTools.auth.tokenSecretName: jt-token
      agent.jiraTools.auth.tokenSecretKey: token
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TOOLS_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TOOLS_SITE_URL
            value: "https://acme.atlassian.net"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TOOLS_EMAIL
            valueFrom:
              secretKeyRef:
                name: jt-mail
                key: email
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_TOOLS_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: jt-token
                key: token
  - it: default values omit presence identity env vars
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_BOT_USER_ID
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_JIRA_BOT_ACCOUNT_ID
      # [DALC-REQ-CHART-RTV-005]
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_OBSERVABILITY_PLUGINS_ENTRY_POINTS
  # [DALC-REQ-CHART-PRESENCE-002] incomplete Secret ref (secretName without secretKey)
  - it: presence slack botUserId without secretKey omits HOSTED_AGENT_SLACK_BOT_USER_ID
    set:
      agent.presence.slack.botUserId.secretName: slack-id-only
      agent.presence.slack.botUserId.secretKey: ""
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOSTED_AGENT_SLACK_BOT_USER_ID

  # [DALC-REQ-CHART-RTV-006] Prompt files via values: supervisor + subagents.
  - it: systemPromptFile loads supervisor prompt from chart files
    set:
      agent.systemPrompt: ""
      agent.systemPromptFile: files/prompts/unittest-prompt.txt
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["system-prompt"]
          pattern: TEST_PROMPT_FROM_FILE

  - it: subagent systemPromptFile resolves text and strips file keys from JSON
    set:
      agent.subagents:
        - name: sa
          systemPromptFile: files/prompts/unittest-prompt.txt
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["subagents.json"]
          pattern: TEST_PROMPT_FROM_FILE
      - notMatchRegex:
          path: data["subagents.json"]
          pattern: systemPromptFile
      - notMatchRegex:
          path: data["subagents.json"]
          pattern: system_prompt_file

  - it: systemPrompt and systemPromptFile both set fails render
    set:
      agent.systemPrompt: inline
      agent.systemPromptFile: files/prompts/unittest-prompt.txt
    template: templates/agent.yaml
    asserts:
      - failedTemplate:
          errorPattern: systemPrompt and systemPromptFile are mutually exclusive

  - it: subagent inline prompt and systemPromptFile both set fails render
    set:
      agent.subagents:
        - name: sa
          systemPrompt: hi
          systemPromptFile: files/prompts/unittest-prompt.txt
    template: templates/agent.yaml
    asserts:
      - failedTemplate:
          errorPattern: has both inline prompt and systemPromptFile

  # [DALC-REQ-CHART-RTV-007] chatModelApiKey: provider env var inference from model prefix.
  - it: chatModelApiKey openai model infers OPENAI_API_KEY from secret
    set:
      agent.chatModel: openai/gpt-4o-mini
      agent.chatModelApiKey.secretName: my-llm-secret
      agent.chatModelApiKey.secretKey: key
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-llm-secret
                key: key

  - it: chatModelApiKey anthropic model infers ANTHROPIC_API_KEY from secret
    set:
      agent.chatModel: anthropic/claude-3-5-haiku-latest
      agent.chatModelApiKey.secretName: my-llm-secret
      agent.chatModelApiKey.secretKey: key
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ANTHROPIC_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-llm-secret
                key: key

  - it: chatModelApiKey envVarName overrides auto-inference
    set:
      agent.chatModel: litellm:custom-model
      agent.chatModelApiKey.secretName: my-llm-secret
      agent.chatModelApiKey.secretKey: key
      agent.chatModelApiKey.envVarName: CUSTOM_API_KEY
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-llm-secret
                key: key

  - it: chatModelApiKey unknown model without envVarName fails render
    set:
      agent.chatModel: litellm:custom-model
      agent.chatModelApiKey.secretName: my-llm-secret
      agent.chatModelApiKey.secretKey: key
    template: templates/agent.yaml
    asserts:
      - failedTemplate:
          errorPattern: cannot be inferred from chatModel

  - it: chatModelApiKey omitted when secretName is empty
    template: templates/agent.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENAI_API_KEY
          any: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: ANTHROPIC_API_KEY
          any: true
