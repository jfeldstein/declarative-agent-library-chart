# Traceability: [DALC-REQ-HELM-UNITTEST-001] [DALC-REQ-HELM-UNITTEST-002] [DALC-REQ-RAG-SCRAPERS-002] [DALC-REQ-RAG-SCRAPERS-004] [DALC-VER-002]
values:
  - ../../examples/hello-world/values.yaml
suite: hello-world default values
release:
  name: cfha-ci
tests:
  - it: produces no scraper CronJob documents when no jira or slack jobs are enabled
    template: charts/declarative-agent-library/templates/scraper-cronjobs.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: produces no scraper job ConfigMaps when no jira or slack jobs are enabled
    template: charts/declarative-agent-library/templates/scraper-job-configmaps.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: does not render RAG deployment
    template: charts/declarative-agent-library/templates/rag-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: does not render RAG service
    template: charts/declarative-agent-library/templates/rag-service.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: does not render RAG ServiceMonitor
    template: charts/declarative-agent-library/templates/rag-servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0
