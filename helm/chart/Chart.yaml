# Traceability: [DALC-REQ-DALC-PKG-001]
# Library chart: Kubernetes manifests are emitted only via named template `declarative-agent.system`
# (included from parent `templates/agent.yaml`). Do not `helm install` this chart alone.
apiVersion: v2
name: declarative-agent-library-chart
