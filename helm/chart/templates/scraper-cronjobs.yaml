{{/* One CronJob per enabled scraper job; secrets via env (Secret refs), config via mounted ConfigMap. Traceability: [DALC-REQ-RAG-SCRAPERS-002] */}}
{{- $root := . }}
{{- if and $root.Values.scrapers.jira.enabled $root.Values.scrapers.jira.jobs }}
{{- range $ji, $job := $root.Values.scrapers.jira.jobs }}
{{- if or (not (hasKey $job "enabled")) $job.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "declarative-agent-library.fullname" $root }}-scraper-jira-{{ $ji }}
  labels:
    {{- include "declarative-agent-library.labels" $root | nindent 4 }}
    app.kubernetes.io/component: scraper
    scraper.agentic.cfha/source: jira
    scraper.agentic.cfha/index: {{ $ji | quote }}
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          {{- if $root.Values.observability.prometheusAnnotations.enabled }}
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9091"
            prometheus.io/path: "/metrics"
          {{- end }}
          labels:
            {{- include "declarative-agent-library.selectorLabels" $root | nindent 12 }}
            app.kubernetes.io/component: scraper
            scraper.agentic.cfha/source: jira
            scraper.agentic.cfha/index: {{ $ji | quote }}
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: scraper-job-config
              configMap:
                name: {{ include "declarative-agent-library.fullname" $root }}-scraper-job-jira-{{ $ji }}
          containers:
            - name: scraper
              image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
              imagePullPolicy: {{ $root.Values.image.pullPolicy }}
              command:
                - python
                - -m
                - hosted_agents.scrapers.jira_job
              ports:
                - name: metrics
                  containerPort: 9091
                  protocol: TCP
              volumeMounts:
                - name: scraper-job-config
                  mountPath: /config
                  readOnly: true
              env:
                - name: RAG_SERVICE_URL
                  value: {{ include "declarative-agent-library.ragInternalBaseUrl" $root | quote }}
                - name: SCRAPER_JOB_CONFIG
                  value: /config/job.json
                - name: SCRAPER_NAME
                  value: {{ printf "jira-%d" $ji | quote }}
                - name: SCRAPER_SCOPE
                  value: {{ default (printf "%s-jira-%d" $root.Release.Name $ji) $job.scope | quote }}
                - name: SCRAPER_INTEGRATION
                  value: "jira"
                - name: SCRAPER_METRICS_ADDR
                  value: "0.0.0.0:9091"
                - name: SCRAPER_METRICS_GRACE_SECONDS
                  value: "35"
                {{- with $root.Values.scrapers.jira }}
                {{- if .siteUrl }}
                - name: JIRA_SITE_URL
                  value: {{ .siteUrl | quote }}
                {{- end }}
                {{- if .watermarkDir }}
                - name: JIRA_WATERMARK_DIR
                  value: {{ .watermarkDir | quote }}
                {{- end }}
                {{- if .auth.emailSecretName }}
                - name: JIRA_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .auth.emailSecretName | quote }}
                      key: {{ .auth.emailSecretKey | quote }}
                {{- end }}
                {{- if .auth.tokenSecretName }}
                - name: JIRA_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .auth.tokenSecretName | quote }}
                      key: {{ .auth.tokenSecretKey | quote }}
                {{- end }}
                {{- end }}
              {{- with $root.Values.scrapers.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if and $root.Values.scrapers.slack.enabled $root.Values.scrapers.slack.jobs }}
{{- range $si, $job := $root.Values.scrapers.slack.jobs }}
{{- if or (not (hasKey $job "enabled")) $job.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "declarative-agent-library.fullname" $root }}-scraper-slack-{{ $si }}
  labels:
    {{- include "declarative-agent-library.labels" $root | nindent 4 }}
    app.kubernetes.io/component: scraper
    scraper.agentic.cfha/source: slack
    scraper.agentic.cfha/index: {{ $si | quote }}
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          {{- if $root.Values.observability.prometheusAnnotations.enabled }}
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9091"
            prometheus.io/path: "/metrics"
          {{- end }}
          labels:
            {{- include "declarative-agent-library.selectorLabels" $root | nindent 12 }}
            app.kubernetes.io/component: scraper
            scraper.agentic.cfha/source: slack
            scraper.agentic.cfha/index: {{ $si | quote }}
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: scraper-job-config
              configMap:
                name: {{ include "declarative-agent-library.fullname" $root }}-scraper-job-slack-{{ $si }}
          containers:
            - name: scraper
              image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
              imagePullPolicy: {{ $root.Values.image.pullPolicy }}
              command:
                - python
                - -m
                - hosted_agents.scrapers.slack_job
              ports:
                - name: metrics
                  containerPort: 9091
                  protocol: TCP
              volumeMounts:
                - name: scraper-job-config
                  mountPath: /config
                  readOnly: true
              env:
                - name: RAG_SERVICE_URL
                  value: {{ include "declarative-agent-library.ragInternalBaseUrl" $root | quote }}
                - name: SCRAPER_JOB_CONFIG
                  value: /config/job.json
                - name: SCRAPER_NAME
                  value: {{ printf "slack-%d" $si | quote }}
                - name: SCRAPER_SCOPE
                  value: {{ default (printf "%s-slack-%d" $root.Release.Name $si) $job.scope | quote }}
                - name: SCRAPER_INTEGRATION
                  value: "slack"
                - name: SCRAPER_METRICS_ADDR
                  value: "0.0.0.0:9091"
                - name: SCRAPER_METRICS_GRACE_SECONDS
                  value: "35"
                {{- with $root.Values.scrapers.slack.stateDir }}
                - name: SLACK_STATE_DIR
                  value: {{ . | quote }}
                {{- end }}
                {{- with $root.Values.scrapers.slack.auth }}
                {{- if .botTokenSecretName }}
                - name: SLACK_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .botTokenSecretName | quote }}
                      key: {{ .botTokenSecretKey | quote }}
                {{- end }}
                {{- if .userTokenSecretName }}
                - name: SLACK_USER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .userTokenSecretName | quote }}
                      key: {{ .userTokenSecretKey | quote }}
                {{- end }}
                {{- end }}
              {{- with $root.Values.scrapers.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
{{- end }}
{{- end }}
{{- end }}
