{{/*
  Scraper dispatch: ``name: reference`` → ``reference_job``; ``integration: slack`` (or
  legacy name ``slack``) → ``slack_job``; ``integration: jira`` → ``jira_job``; else ``stub_job``.
  See ``hosted_agents.scrapers`` package docstring / ``metrics.py`` checklist.
*/}}
{{- range .Values.scrapers.jobs }}
{{- if .enabled }}
{{- $int := (.integration | default "") | lower }}
{{- $nameLower := .name | lower }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "declarative-agent-library.fullname" $ }}-scraper-{{ .name }}
  labels:
    {{- include "declarative-agent-library.labels" $ | nindent 4 }}
    app.kubernetes.io/component: scraper
    scraper.agentic.cfha/name: {{ .name | quote }}
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          {{- if $.Values.o11y.prometheusAnnotations.enabled }}
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9091"
            prometheus.io/path: "/metrics"
          {{- end }}
          labels:
            {{- include "declarative-agent-library.selectorLabels" $ | nindent 12 }}
            app.kubernetes.io/component: scraper
            scraper.agentic.cfha/name: {{ .name | quote }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scraper
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              {{- if eq .name "reference" }}
              command:
                - python
                - -m
                - hosted_agents.scrapers.reference_job
              {{- else if or (eq $int "slack") (eq $nameLower "slack") }}
              command:
                - python
                - -m
                - hosted_agents.scrapers.slack_job
              {{- else if or (eq $int "jira") (eq $nameLower "jira") }}
              command:
                - python
                - -m
                - hosted_agents.scrapers.jira_job
              {{- else }}
              command:
                - python
                - -m
                - hosted_agents.scrapers.stub_job
              {{- end }}
              ports:
                - name: metrics
                  containerPort: 9091
                  protocol: TCP
              env:
                - name: RAG_SERVICE_URL
                  value: {{ include "declarative-agent-library.ragInternalBaseUrl" $ | quote }}
                - name: SCRAPER_NAME
                  value: {{ .name | quote }}
                - name: SCRAPER_SCOPE
                  value: {{ (.scope | default .name) | quote }}
                - name: SCRAPER_INTEGRATION
                  value: {{ (.integration | default .name) | quote }}
                - name: SCRAPER_METRICS_ADDR
                  value: "0.0.0.0:9091"
                - name: SCRAPER_METRICS_GRACE_SECONDS
                  value: "35"
                {{- if or (eq $int "jira") (eq $nameLower "jira") }}
                {{- with $.Values.scrapers.jira }}
                {{- if .siteUrl }}
                - name: JIRA_SITE_URL
                  value: {{ .siteUrl | quote }}
                {{- end }}
                {{- if .projectKeys }}
                - name: JIRA_PROJECT_KEYS
                  value: {{ join "," .projectKeys | quote }}
                {{- end }}
                {{- if .watermarkDir }}
                - name: JIRA_WATERMARK_DIR
                  value: {{ .watermarkDir | quote }}
                {{- end }}
                {{- if .auth.emailSecretName }}
                - name: JIRA_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .auth.emailSecretName | quote }}
                      key: {{ .auth.emailSecretKey | quote }}
                {{- end }}
                {{- if .auth.tokenSecretName }}
                - name: JIRA_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .auth.tokenSecretName | quote }}
                      key: {{ .auth.tokenSecretKey | quote }}
                {{- end }}
                {{- with .defaults }}
                {{- if hasKey . "maxIssuesPerRun" }}
                - name: JIRA_MAX_ISSUES_PER_RUN
                  value: {{ .maxIssuesPerRun | toString | quote }}
                {{- end }}
                {{- if hasKey . "maxCommentsPerIssue" }}
                - name: JIRA_MAX_COMMENTS_PER_ISSUE
                  value: {{ .maxCommentsPerIssue | toString | quote }}
                {{- end }}
                {{- if hasKey . "overlapMinutes" }}
                - name: JIRA_OVERLAP_MINUTES
                  value: {{ .overlapMinutes | toString | quote }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- with .extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- with $.Values.scrapers.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
{{- end }}
{{- end }}
