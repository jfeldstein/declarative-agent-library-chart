{{- $obsPg := .Values.observability.postgres | default dict }}
{{- $migrations := $obsPg.migrations | default dict }}
{{- if $migrations.enabled }}
{{- $pgUrlTop := .Values.observability.postgresUrlSecret | default dict }}
{{- $urlSec := $obsPg.urlSecret | default dict }}
{{- $migSec := or $pgUrlTop.name $urlSec.name "" }}
{{- if not $migSec }}
{{- fail "observability.postgres.migrations.enabled requires observability.postgresUrlSecret.name or observability.postgres.urlSecret.name (and key) for DATABASE_URL" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "declarative-agent-library.fullname" . }}-observability-sql
  labels:
    {{- include "declarative-agent-library.labels" . | nindent 4 }}
data:
  001_hosted_agents_observability.sql: |-
{{ .Files.Get "files/observability/001_hosted_agents_observability.sql" | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "declarative-agent-library.fullname" . }}-observability-migrate
  labels:
    {{- include "declarative-agent-library.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: {{ $migrations.image | default "postgres:16-alpine" | quote }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $migSec }}
                  key: {{ or $pgUrlTop.key $urlSec.key "DATABASE_URL" }}
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/001_hosted_agents_observability.sql
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: {{ include "declarative-agent-library.fullname" . }}-observability-sql
{{- end }}
