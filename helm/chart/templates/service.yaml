apiVersion: v1
kind: Service
metadata:
  name: {{ include "declarative-agent-library.fullname" . }}
  labels:
    {{- include "declarative-agent-library.labels" . | nindent 4 }}
  {{- if .Values.observability.prometheusAnnotations.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.service.port | quote }}
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "declarative-agent-library.agentSelectorLabels" . | nindent 4 }}
