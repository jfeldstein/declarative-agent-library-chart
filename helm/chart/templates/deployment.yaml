apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "declarative-agent-library.fullname" . }}
  labels:
    {{- include "declarative-agent-library.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "declarative-agent-library.agentSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "declarative-agent-library.agentSelectorLabels" . | nindent 8 }}
      {{- if .Values.observability.prometheusAnnotations.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          env:
            {{- $pgUrl := or .Values.observability.postgresUrl .Values.observability.postgres.url "" }}
            {{- $pgSecName := or .Values.observability.postgresUrlSecret.name .Values.observability.postgres.urlSecret.name "" }}
            {{- $pgSecKey := or .Values.observability.postgresUrlSecret.key .Values.observability.postgres.urlSecret.key "DATABASE_URL" }}
            - name: HOSTED_AGENT_SYSTEM_PROMPT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "declarative-agent-library.fullname" . }}-config
                  key: system-prompt
            {{- if .Values.chatModel }}
            - name: HOSTED_AGENT_CHAT_MODEL
              value: {{ .Values.chatModel | quote }}
            {{- end }}
            - name: HOSTED_AGENT_RAG_BASE_URL
              value: {{ include "declarative-agent-library.ragInternalBaseUrl" . | quote }}
            - name: HOSTED_AGENT_SUBAGENTS_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ include "declarative-agent-library.fullname" . }}-config
                  key: subagents.json
            - name: HOSTED_AGENT_SKILLS_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ include "declarative-agent-library.fullname" . }}-config
                  key: skills.json
            - name: HOSTED_AGENT_ENABLED_MCP_TOOLS_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ include "declarative-agent-library.fullname" . }}-config
                  key: enabled-mcp-tools.json
            {{- if .Values.observability.structuredLogs.json }}
            - name: HOSTED_AGENT_LOG_FORMAT
              value: "json"
            {{- end }}
            {{- if .Values.checkpoints.postgresUrl }}
            - name: HOSTED_AGENT_POSTGRES_URL
              value: {{ .Values.checkpoints.postgresUrl | quote }}
            {{- end }}
            {{- if .Values.checkpoints.enabled }}
            - name: HOSTED_AGENT_CHECKPOINTS_ENABLED
              value: "true"
            - name: HOSTED_AGENT_CHECKPOINT_BACKEND
              value: {{ .Values.checkpoints.backend | quote }}
            {{- end }}
            {{- if .Values.wandb.enabled }}
            - name: HOSTED_AGENT_WANDB_ENABLED
              value: "true"
            {{- if .Values.wandb.project }}
            - name: WANDB_PROJECT
              value: {{ .Values.wandb.project | quote }}
            {{- end }}
            {{- if .Values.wandb.entity }}
            - name: WANDB_ENTITY
              value: {{ .Values.wandb.entity | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.scrapers.slack.feedback.enabled }}
            - name: HOSTED_AGENT_SLACK_FEEDBACK_ENABLED
              value: "true"
            - name: HOSTED_AGENT_SLACK_EMOJI_LABEL_MAP_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ include "declarative-agent-library.fullname" . }}-config
                  key: slack-emoji-label-map.json
            {{- end }}
            {{- if .Values.scrapers.slack.feedback.labelRegistry }}
            - name: HOSTED_AGENT_LABEL_REGISTRY_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ include "declarative-agent-library.fullname" . }}-config
                  key: label-registry.json
            {{- end }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
