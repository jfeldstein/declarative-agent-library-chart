{{- if include "declarative-agent.ragDeployed" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "declarative-agent.fullname" . }}-rag
  labels:
    {{- include "declarative-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: rag
  {{- if .Values.observability.prometheusAnnotations.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.scrapers.ragService.service.port | quote }}
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: {{ .Values.scrapers.ragService.service.type }}
  ports:
    - port: {{ .Values.scrapers.ragService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "declarative-agent.ragSelectorLabels" . | nindent 4 }}
{{- end }}
