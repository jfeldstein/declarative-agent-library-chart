# Traceability: [DALC-REQ-DALC-PKG-003]
replicaCount: 1

image:
  repository: declarative-agent-library-chart
  tag: local
  pullPolicy: IfNotPresent

# Maps to HOSTED_AGENT_SYSTEM_PROMPT (ConfigMap + env).
# This is the **supervisor** system prompt when ``subagents`` is non-empty (LangChain subagents pattern).
systemPrompt: |
  Respond, "Hello :wave:"

# Optional chat model for the supervisor when ``subagents`` is non-empty, e.g. ``openai:gpt-4o-mini``.
# Maps to HOSTED_AGENT_CHAT_MODEL. Install the matching LangChain provider package in the image.
chatModel: ""

service:
  type: ClusterIP
  port: 8088
  # When type is NodePort, set 30000–32767 (optional local kind mapping)
  nodePort: null

resources: {}

nameOverride: ""
fullnameOverride: ""

# Optional extra environment variables on the agent container (checkpoint store, W&B, etc.).
# Example: [{ name: HOSTED_AGENT_CHECKPOINT_STORE, value: "none" }]
# checkpoints.postgresUrl → HOSTED_AGENT_POSTGRES_URL on the agent container.
# LLM cost **estimates** on /metrics (optional): HOSTED_AGENT_LLM_EST_COST_USD_PER_INPUT_TOKEN,
# HOSTED_AGENT_LLM_EST_COST_USD_PER_OUTPUT_TOKEN (non-negative floats; both required to increment
# agent_runtime_llm_estimated_cost_usd_total). See docs/observability.md.
extraEnv: []

# Slack / Jira agent identity (Kubernetes Secret → HOSTED_AGENT_SLACK_BOT_USER_ID /
# HOSTED_AGENT_JIRA_BOT_ACCOUNT_ID when both secretName and secretKey are non-empty).
# Traceability: [DALC-REQ-CHART-PRESENCE-001]
presence:
  slack:
    botUserId:
      secretName: ""
      secretKey: ""
  jira:
    botAccountId:
      secretName: ""
      secretKey: ""

# Kubernetes / Prometheus: scrape annotations, optional ServiceMonitor, structured JSON logs.
observability:
  # [DALC-REQ-POSTGRES-AGENT-PERSISTENCE-005] Default avoids DB until Postgres store is selected.
  store: memory
  prometheusAnnotations:
    enabled: false
  structuredLogs:
    # When true, agent container sets HOSTED_AGENT_LOG_FORMAT=json (stdout JSON logs)
    json: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    extraLabels: {}
  postgresUrl: ""
  postgresUrlSecret:
    name: ""
    key: DATABASE_URL
  postgres:
    url: ""
    # Caps shared psycopg pool sizing when Postgres is used (checkpoint + observability).
    poolMax: 5
    urlSecret:
      name: ""
      key: DATABASE_URL
    migrations:
      enabled: false
      image: postgres:16-alpine
  # Optional provider plugins (single tree for agent + scraper processes). Phase 2+ wires env/templates.
  plugins:
    prometheus:
      enabled: false
    langfuse:
      enabled: false
    wandb:
      enabled: false
    grafana:
      enabled: false
    # dalc-plugin-log-shipping: when enabled, chart sets HOSTED_AGENT_LOG_FORMAT=json on the agent
    # (same effect as observability.structuredLogs.json). Use this flag to express “ship stdout logs”
    # alongside other observability.plugins toggles without duplicating structuredLogs.
    logShipping:
      enabled: false

# LangGraph checkpoint store (maps to HOSTED_AGENT_CHECKPOINT_* when enabled).
checkpoints:
  postgresUrl: ""
  enabled: false
  backend: memory

# Weights & Biases tracing (maps to HOSTED_AGENT_WANDB_* and WANDB_* when enabled).
wandb:
  enabled: false
  project: ""
  entity: ""

# Traceability: [DALC-REQ-RAG-SCRAPERS-003] (RAG tunables under ``scrapers.ragService``).
# Scheduled scrapers: ``scrapers.jira`` and ``scrapers.slack`` each have ``enabled``, ``jobs[]``.
# When any job has ``enabled: true`` (and the parent ``enabled`` is true), the chart deploys RAG.
# Job JSON (minus secrets) is mounted at ``/config/job.json``; tokens come from Secret refs in env.
scrapers:
  resources: {}
  # Traceability: [DALC-REQ-SCRAPER-CURSOR-003]
  # Durable cursor store for Jira/Slack incremental state.
  # backend=file keeps existing JIRA_WATERMARK_DIR / SLACK_STATE_DIR behavior.
  # backend=postgres enables SCRAPER_CURSOR_BACKEND=postgres and DSN wiring on scraper CronJobs only.
  cursorStore:
    backend: file
    # Optional scraper-specific DSN Secret override. When set, this wins over checkpoints.postgresUrl.
    postgresUrlSecretName: ""
    postgresUrlSecretKey: url
  # Traceability: [DALC-REQ-JIRA-SCRAPER-001]
  jira:
    enabled: false
    siteUrl: ""
    watermarkDir: ""
    auth:
      emailSecretName: ""
      emailSecretKey: email
      tokenSecretName: ""
      tokenSecretKey: token
    defaults: {}
    jobs: []
  slack:
    enabled: false
    stateDir: /tmp/slack-scraper-state
    auth:
      botTokenSecretName: ""
      botTokenSecretKey: token
      userTokenSecretName: ""
      userTokenSecretKey: token
    defaults: {}
    jobs: []
    # Human feedback from Slack reactions (emoji map + label taxonomy for HOSTED_AGENT_LABEL_REGISTRY_JSON).
    feedback:
      enabled: false
      emojiLabelMap: {}
      labelRegistry: {}
  ragService:
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8090
    resources: {}

# LLM-time Jira REST tools on the agent Deployment (distinct ``HOSTED_AGENT_JIRA_TOOLS_*`` keys;
# not ``scrapers.jira.*`` auth and not jira-trigger webhook verification keys).
# Traceability: [DALC-REQ-JIRA-TOOLS-002]
jiraTools:
  enabled: false
  simulated: true
  siteUrl: ""
  timeoutSeconds: 30
  scopes:
    search: false
    read: false
    comment: false
    transition: false
    create: false
    update: false
  allowedProjectKeys: []
  maxSearchResults: 50
  maxJqlLength: 4000
  auth:
    emailSecretName: ""
    emailSecretKey: email
    tokenSecretName: ""
    tokenSecretKey: token

# Declarative subagents (JSON → HOSTED_AGENT_SUBAGENTS_JSON). See README (LangChain subagents pattern).
subagents: []

# Skill catalog (JSON → HOSTED_AGENT_SKILLS_JSON). See README (LangChain skills pattern).
skills: []

# MCP-style tool allowlist (JSON array of tool ids → HOSTED_AGENT_ENABLED_MCP_TOOLS_JSON)
mcp:
  enabledTools: []

# LLM-time Slack Web API tools → HOSTED_AGENT_SLACK_TOOLS_* on the agent Deployment only.
# Disjoint from scrapers.slack.auth (CronJob SLACK_BOT_TOKEN / SLACK_USER_TOKEN) and from slack-trigger.
# Traceability: [DALC-REQ-SLACK-TOOLS-002]
slackTools:
  botTokenSecretName: ""
  botTokenSecretKey: token
  historyLimit: 50
  timeoutSeconds: 30

# Inbound Slack app_mention → hosted trigger. Uses HOSTED_AGENT_SLACK_TRIGGER_*;
# not scrapers.* or slackTools.*.
# [DALC-REQ-SLACK-TRIGGER-004]
slackTrigger:
  enabled: false
  socketMode: false
  eventDedupe: false
  signingSecretSecretName: ""
  signingSecretSecretKey: signing-secret
  appTokenSecretName: ""
  appTokenSecretKey: app-token
  botTokenSecretName: ""
  botTokenSecretKey: token

# Inbound Jira webhooks → hosted trigger. Uses HOSTED_AGENT_JIRA_TRIGGER_*;
# not scrapers.jira or jiraTools.*.
# [DALC-REQ-JIRA-TRIGGER-004]
jiraTrigger:
  enabled: false
  eventDedupe: false
  webhookSecretSecretName: ""
  webhookSecretSecretKey: webhook-secret
  httpPath: ""
