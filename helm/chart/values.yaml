replicaCount: 1

image:
  repository: config-first-hosted-agents
  tag: local
  pullPolicy: IfNotPresent

# Maps to HOSTED_AGENT_SYSTEM_PROMPT (ConfigMap + env).
# This is the **supervisor** system prompt when ``subagents`` is non-empty (LangChain subagents pattern).
systemPrompt: |
  Respond, "Hello :wave:"

# Optional chat model for the supervisor when ``subagents`` is non-empty, e.g. ``openai:gpt-4o-mini``.
# Maps to HOSTED_AGENT_CHAT_MODEL. Install the matching LangChain provider package in the image.
chatModel: ""

service:
  type: ClusterIP
  port: 8088
  # When type is NodePort, set 30000–32767 (optional local kind mapping)
  nodePort: null

resources: {}

nameOverride: ""
fullnameOverride: ""

# Optional extra environment variables on the agent container (checkpoint store, W&B, etc.).
# Example: [{ name: HOSTED_AGENT_CHECKPOINT_STORE, value: "none" }]
# checkpoints.postgresUrl → HOSTED_AGENT_POSTGRES_URL on the agent container.
extraEnv: []

# Kubernetes / Prometheus: scrape annotations, optional ServiceMonitor, structured JSON logs.
observability:
  prometheusAnnotations:
    enabled: false
  structuredLogs:
    # When true, agent container sets HOSTED_AGENT_LOG_FORMAT=json (stdout JSON logs)
    json: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    extraLabels: {}

# LangGraph checkpoint store (maps to HOSTED_AGENT_CHECKPOINT_* when enabled).
checkpoints:
  postgresUrl: ""
  enabled: false
  backend: memory

# Weights & Biases tracing (maps to HOSTED_AGENT_WANDB_* and WANDB_* when enabled).
wandb:
  enabled: false
  project: ""
  entity: ""

# Traceability: [DALC-REQ-RAG-SCRAPERS-003] (RAG tunables under ``scrapers.ragService``).
# Scheduled scrapers: ``scrapers.jira`` and ``scrapers.slack`` each have ``enabled``, ``jobs[]``.
# When any job has ``enabled: true`` (and the parent ``enabled`` is true), the chart deploys RAG.
# Job JSON (minus secrets) is mounted at ``/config/job.json``; tokens come from Secret refs in env.
scrapers:
  resources: {}
  jira:
    enabled: false
    siteUrl: ""
    watermarkDir: ""
    auth:
      emailSecretName: ""
      emailSecretKey: email
      tokenSecretName: ""
      tokenSecretKey: token
    defaults: {}
    jobs: []
  slack:
    enabled: false
    stateDir: /tmp/slack-scraper-state
    auth:
      botTokenSecretName: ""
      botTokenSecretKey: token
      userTokenSecretName: ""
      userTokenSecretKey: token
    defaults: {}
    jobs: []
    # Human feedback from Slack reactions (emoji map + label taxonomy for HOSTED_AGENT_LABEL_REGISTRY_JSON).
    feedback:
      enabled: false
      emojiLabelMap: {}
      labelRegistry: {}
  ragService:
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8090
    resources: {}

# Declarative subagents (JSON → HOSTED_AGENT_SUBAGENTS_JSON). See README (LangChain subagents pattern).
subagents: []

# Skill catalog (JSON → HOSTED_AGENT_SKILLS_JSON). See README (LangChain skills pattern).
skills: []

# MCP-style tool allowlist (JSON array of tool ids → HOSTED_AGENT_ENABLED_MCP_TOOLS_JSON)
mcp:
  enabledTools: []
