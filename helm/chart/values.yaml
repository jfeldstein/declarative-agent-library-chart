replicaCount: 1

image:
  repository: config-first-hosted-agents
  tag: local
  pullPolicy: IfNotPresent

# Maps to HOSTED_AGENT_SYSTEM_PROMPT (ConfigMap + env).
# This is the **supervisor** system prompt when ``subagents`` is non-empty (LangChain subagents pattern).
systemPrompt: |
  Respond, "Hello :wave:"

# Optional chat model for the supervisor when ``subagents`` is non-empty, e.g. ``openai:gpt-4o-mini``.
# Maps to HOSTED_AGENT_CHAT_MODEL. Install the matching LangChain provider package in the image.
chatModel: ""

service:
  type: ClusterIP
  port: 8088
  # When type is NodePort, set 30000–32767 (optional local kind mapping)
  nodePort: null

resources: {}

nameOverride: ""
fullnameOverride: ""

# Optional extra environment variables on the agent container (checkpoint store, W&B, etc.).
# Example: [{ name: HOSTED_AGENT_CHECKPOINT_STORE, value: "none" }]
extraEnv: []

# Observability: Prometheus scrape hints (off by default) and optional ServiceMonitor
o11y:
  prometheusAnnotations:
    enabled: false
  structuredLogs:
    # When true, agent container sets HOSTED_AGENT_LOG_FORMAT=json (stdout JSON logs)
    json: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    extraLabels: {}

# Traceability: [CFHA-REQ-RAG-SCRAPERS-003] (RAG tunables under ``scrapers.ragService``).
# Scheduled scrapers (CronJobs). When at least one job has enabled: true, the chart also
# deploys the managed RAG HTTP service (see scrapers.ragService). Reference job POSTs to RAG_SERVICE_URL.
scrapers:
  resources: {}
  ragService:
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8090
    resources: {}
  jobs: []

# Declarative subagents (JSON → HOSTED_AGENT_SUBAGENTS_JSON). See README (LangChain subagents pattern).
subagents: []

# Skill catalog (JSON → HOSTED_AGENT_SKILLS_JSON). See README (LangChain skills pattern).
skills: []

# MCP-style tool allowlist (JSON array of tool ids → HOSTED_AGENT_ENABLED_MCP_TOOLS_JSON)
mcp:
  enabledTools: []

# Checkpointing, W&B, Slack feedback, ATIF export, shadow rollouts (runtime env). See docs/runbook-checkpointing-wandb.md.
observability:
  checkpoints:
    enabled: false
    backend: memory
    postgresUrl: ""
  wandb:
    enabled: false
    project: ""
    entity: ""
  slackFeedback:
    enabled: false
    emojiLabelMap: {}
  atifExport:
    enabled: false
  shadow:
    enabled: false
    sampleRate: 0
    allowTenants: []
    variantJson: ""
  labelRegistry: {}
