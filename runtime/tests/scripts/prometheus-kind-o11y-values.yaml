# Minimal Prometheus for kind integration tests (helm install prometheus-community/prometheus).
# @SCRAPE_TARGET_AGENT@ and @SCRAPE_TARGET_RAG@ are replaced by integration_kind_o11y_prometheus.sh.

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

# Pre-loaded into kind via ctr import; avoid registry pulls that stall on CI.
configmapReload:
  prometheus:
    image:
      pullPolicy: Never

server:
  persistentVolume:
    enabled: false
  # Chart default tracks Prometheus 3.x; pin 2.x for stable args with this chart on kind CI.
  image:
    repository: quay.io/prometheus/prometheus
    tag: v2.55.1
    pullPolicy: Never
  global:
    scrape_interval: 3s
    scrape_timeout: 2s
    evaluation_interval: 3s

extraScrapeConfigs: |
  - job_name: cfha-agent-metrics
    metrics_path: /metrics
    scrape_interval: 3s
    static_configs:
      - targets:
          - "@SCRAPE_TARGET_AGENT@"
  - job_name: cfha-rag-metrics
    metrics_path: /metrics
    scrape_interval: 3s
    static_configs:
      - targets:
          - "@SCRAPE_TARGET_RAG@"
